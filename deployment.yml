spec:
  nodeSelector:
    group: quickticket-backend
  containers:
    - name: quickticket-backend
      image: "${DOCKER_IMAGE_URI}"
      env:
        - name: PROD_DB_URL
          valueFrom:
            secretKeyRef:
              name: quickticket-prod-db-master-secret
              key: url
        - name: PROD_DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: quickticket-prod-db-master-secret
              key: username
        - name: PROD_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: quickticket-prod-db-master-secret
              key: password
        - name: PROD_DB_REPLICA_URL
          valueFrom:
            secretKeyRef:
              name: quickticket-prod-db-replica-secret
              key: url
        - name: PROD_DB_REPLICA_USERNAME
          valueFrom:
            secretKeyRef:
              name: quickticket-prod-db-replica-secret
              key: username
        - name: PROD_DB_REPLICA_PASSWORD
          valueFrom:
            secretKeyRef:
              name: quickticket-prod-db-replica-secret
              key: password
        - name: PROD_REDIS_HOST
          valueFrom:
            secretKeyRef:
              name: quickticket-prod-redis-secret
              key: host
        - name: PROD_REDIS_PORT
          valueFrom:
            secretKeyRef:
              name: quickticket-prod-redis-secret
              key: port
        - name: PROD_AWS_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: quickticket-prod-aws-secret
              key: access-key
        - name: PROD_AWS_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: quickticket-prod-aws-secret
              key: secret-key
        - name: PROD_AWS_REGION
          valueFrom:
            secretKeyRef:
              name: quickticket-prod-aws-secret
              key: region
        - name: PROD_AWS_S3_BUCKET
          valueFrom:
            secretKeyRef:
              name: quickticket-prod-aws-secret
              key: s3-bucket