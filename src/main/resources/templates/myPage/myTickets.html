<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/defaultLayout}">
<head>
    <title>QuickTicket - 내 예매 목록</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/myPage.css}">
</head>
<body>
<main layout:fragment="content">
    <div class="page-wrapper">
        <div class="main-container">
            <div class="mypage-body">
                <aside th:replace="~{fragments/sidebar :: sidebarFragment}"></aside>

                <main class="mypage-content">
                    <h2 class="sub-title">전체 예매 목록</h2>
                    <table class="common-table">
                        <thead>
                            <tr style="background-color: #f8f9fa;">
                                <!--
                                <th style="width: 2%; text-align: center;">
                                    <input type="checkbox" id="checkAll">
                                </th>
                                -->
                                <th style="width: 4%; text-align: center;">NO</th>
                                <th style="width: 12%;">예매번호</th>
                                <th style="width: auto;">콘서트명</th>
                                <th style="width: 18%;">관람일</th>
                                <th style="width: 8%;">매수</th>
                                <th style="width: 15%;">예매날</th>
                                <th style="width: 10%; text-align: center;">상태</th>
                            </tr>
                        </thead>
                        <tbody id="ticketListContainer">
                        <tr th:each="ticket, stat : ${tickets}">
                            <!--
                            <td style="text-align: center;">
                                <input type="checkbox" class="child-check" th:value="${ticket.id}">
                            </td>
                            -->
                            <td th:text="${stat.count}">1</td>
                            <td th:text="'RES-' + ${ticket.id}">RES-101</td>
                            <td>
                                <a th:href="@{/myTicket/{id}(id=${ticket.id})}" class="link-title" th:text="${ticket.eventName}">
                                    콘서트 제목
                                </a>
                            </td>
                            <td th:text="${ticket.performanceStartsAt != null ? #temporals.format(ticket.performanceStartsAt, 'yyyy-MM-dd HH:mm') : '-'}">
                                2026-02-28
                            </td>
                            <td th:text="${ticket.personNumber + '매'}">1매</td>
                            <td th:text="${ticket.createdAt != null ? #temporals.format(ticket.createdAt, 'yyyy-MM-dd') : '-'}">
                                2026-01-15
                            </td>
                            <td style="text-align: center;">
                                <div th:switch="${ticket.status?.name()}">
                                    <span th:case="'SEAT_ALLOCATED_ALL'" class="status-badge status-ok">예매완료</span>
                                    <span th:case="'CANCELED'" class="status-badge status-cancel">취소완료</span>
                                    <span th:case="'WAITING'" class="status-badge status-waiting">결제대기</span>
                                    <span th:case="'SEAT_ALLOCATED_PARTIAL'" class="status-badge status-partial">부분확정</span>
                                    <span th:case="*" class="status-badge status-default" th:text="${ticket.status}">상태</span>
                                </div>
                            </td>
                        </tr>

                        <tr th:if="${#lists.isEmpty(tickets)}">
                            <td colspan="9" style="text-align: center; padding: 50px 0; color: #666;">
                                예매 내역이 없습니다.
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </main>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        document.addEventListener('DOMContentLoaded', function() {
            const checkAll = document.getElementById('checkAll');
            const childChecks = document.querySelectorAll('.child-check');

            if(checkAll) {
                checkAll.addEventListener('change', function() {
                    childChecks.forEach(check => check.checked = this.checked);
                });
            }
        });
    </script>
</main>
</body>
</html>
